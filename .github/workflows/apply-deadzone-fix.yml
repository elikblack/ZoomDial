name: Apply dial2 dead-zone fix

on:
  push:
    paths:
      - '.github/workflows/apply-deadzone-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Update dial2.html
        run: python tools/fix_deadzone_initial.py
      - name: Commit the fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dial2.html
          git commit -m "Initialize dead-zone ring at zero length"
          git push
