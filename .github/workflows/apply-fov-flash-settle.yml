name: Apply FOV flash and settle

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-fov-flash-settle.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore FOV flash reveal and settle
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('zoomdial-2-0.html')
          text = path.read_text()

          if 'const sectorFlashIn = {' in text:
              raise SystemExit('FOV flash effect is already installed')

          effect_start = text.index('  // Reveals grouped FOV sectors in order while rotating the ring into place.')
          effect_end = text.index('  // General-purpose rotation effects retained as additional options for', effect_start)

          new_effect = """  // Flashes grouped FOV sectors into view one at a time. The ring stays
  // parked at its startup offset during the reveal; a separate rotation step
  // settles it to true zero after every sector has loaded.
  const sectorFlashIn = {
    reset(groups, params){
      groups.flat().forEach(el => {
        el.style.opacity = 0;
        el.style.stroke = '';
      });
      const angle = params.parkAngle ?? 0;
      params.ring.style.transform = `rotate(${angle}deg)`;
      params.onUpdate?.(angle);
    },
    apply(groups, p, params){
      const scaled = p * groups.length;

      groups.forEach((group, i) => {
        const local = Math.max(0, Math.min(1, scaled - i));
        if (local <= 0) return;

        group.forEach(el => {
          const target = el.classList.contains('fov-tick')
            ? (params.tickTo ?? COL_GLASS)
            : (params.segmentTo ?? COL_MID);
          el.style.opacity = 1;
          el.style.stroke = lerpColor(params.from ?? COL_BRIGHT, target, local);
        });
      });
    }
  };

"""

          text = text[:effect_start] + new_effect + text[effect_end:]

          old_angle = '  const FOV_START_ANGLE = 60;'
          if old_angle not in text:
              raise SystemExit('Expected FOV startup angle was not found')
          text = text.replace(old_angle, '  const FOV_START_ANGLE = 30;', 1)

          step_start = text.index('    // ----- FOV ring -----')
          step_end = text.index('    // ----- FOV ring numbers -----', step_start)

          new_steps = """    // ----- FOV ring -----
    {
      id: 'fovRing', effect: sectorFlashIn, duration: 800, start: { after: 'ring', at: 0.75 },
      targets: () => fovSegments.map((seg, i) => [seg.el, fovTicks[i].el]),
      params: {
        ring: fovRingEl,
        parkAngle: FOV_START_ANGLE,
        from: COL_BRIGHT,
        segmentTo: COL_MID,
        tickTo: COL_GLASS,
        onUpdate: positionFovLabels
      }
    },
    {
      id: 'fovSettle', effect: rotateIn, duration: 250, start: { after: 'fovRing', at: 1 },
      targets: () => [fovRingEl],
      params: {
        from: FOV_START_ANGLE,
        to: 0,
        ease: easeOutCubic,
        onUpdate: positionFovLabels
      }
    },

"""

          text = text[:step_start] + new_steps + text[step_end:]
          path.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zoomdial-2-0.html
          git commit -m "Restore FOV sector flash and zero settle"
          git push
