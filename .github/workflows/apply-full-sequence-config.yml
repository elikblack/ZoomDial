name: Apply full sequence configuration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-full-sequence-config.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert remaining startup elements to sequence steps
        run: python .github/scripts/apply_full_sequence_config.py

      - name: Commit patch and remove one-time migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/apply-full-sequence-config.yml
          rm .github/scripts/apply_full_sequence_config.py
          git add zoomdial-2-0.html .github/workflows/apply-full-sequence-config.yml .github/scripts/apply_full_sequence_config.py
          git commit -m "Make all startup elements sequence-configurable"
          git push
