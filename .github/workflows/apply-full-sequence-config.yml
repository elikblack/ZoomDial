name: Apply full sequence configuration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-full-sequence-config.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert remaining startup elements to sequence steps
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('zoomdial-2-0.html')
          text = path.read_text()

          replacements = {
              '<body>': '<body class="startup-pending">',
              'id="eyebrowBox"': 'id="eyebrow"',
              'id="fovBox"': 'id="fov-box"',
              "document.getElementById('eyebrowBox')": "document.getElementById('eyebrow')",
              "document.getElementById('fovBox')": "document.getElementById('fov-box')",
              "  const COL_DIM    = '#0c3a18';": "  const COL_DIM    = '#0c3a18';\n  const COL_GLASS  = '#020602';",
          }

          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected exactly one occurrence of: {old}')
              text = text.replace(old, new, 1)

          old_css = """  /* everything the sequence reveals starts invisible */
  #pointerBox, #pointerCaret,
  .readout,
  .fov-annulus-seg, .fov-tick, .fov-label-fixed,
  #zoomLabels text{
    opacity:0;
  }
"""

          new_css = """  /* First-paint safety: every sequence-controlled element begins dark. */
  .startup-pending #pointerBox,
  .startup-pending #pointerCaret,
  .startup-pending .tick,
  .startup-pending #greebleTrack,
  .startup-pending #greebleFill,
  .startup-pending #deadZone,
  .startup-pending #zoomLabels text,
  .startup-pending .fov-annulus-seg,
  .startup-pending .fov-tick,
  .startup-pending .fov-label-fixed,
  .startup-pending #eyebrow,
  .startup-pending #value,
  .startup-pending #fov-box{
    opacity:0;
  }
"""

          if text.count(old_css) != 1:
              raise SystemExit('Expected startup CSS block was not found exactly once')
          text = text.replace(old_css, new_css, 1)

          new_sequence = r"""  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

  // ==========================================================
  // Sequence engine
  // ==========================================================
  //
  // Each step describes its targets, effect, duration, and start time.
  // `start` is the editable timing instruction. It can be absolute:
  //
  //   start: 100
  //     Begin 100ms after the timeline starts.
  //
  // Or it can be relative to another step:
  //
  //   start: { after: 'pointer', at: 0.5 }
  //     Begin halfway through the step named "pointer".
  //
  // `resolveStarts()` translates those readable instructions into an
  // absolute millisecond value called `resolvedStart`, which is what the
  // animation loop uses. A referenced step must appear earlier in the list.
  //
  // Effects are swappable single-purpose objects. Each has a `reset` method
  // for the pre-sequence state and an `apply` method for progress from 0 to 1.

  function resolveStarts(steps){
    const byId = {};
    steps.forEach(s => { byId[s.id] = s; });
    steps.forEach(s => {
      if (typeof s.start === 'number'){
        s.resolvedStart = s.start;
      } else {
        const ref = byId[s.start.after];
        if (!ref || ref.resolvedStart == null){
          throw new Error(`Step "${s.id}" refers to "${s.start.after}" before it's resolved - list steps in dependency order.`);
        }
        s.resolvedStart = ref.resolvedStart + ref.duration * s.start.at;
      }
    });
    return steps;
  }

  function sequenceEnd(steps){
    return Math.max(...steps.map(s => s.resolvedStart + s.duration));
  }

  function runTimeline(steps, onDone){
    steps.forEach(s => s.effect.reset(s.targets(), s.params));

    const end = sequenceEnd(steps);
    const t0 = performance.now();

    function frame(now){
      const t = now - t0;
      steps.forEach(s => {
        if (t < s.resolvedStart) return;
        const p = Math.min(1, (t - s.resolvedStart) / s.duration);
        s.effect.apply(s.targets(), p, s.params);
      });
      if (t < end) requestAnimationFrame(frame);
      else onDone?.();
    }
    requestAnimationFrame(frame);
  }

  // ---------- effects ----------

  // Bright flash, then settles to a normal colour and opacity.
  const flashIn = {
    reset(els){ els.forEach(el => { el.style.opacity = 0; }); },
    apply(els, p, params){
      const eased = params.ease ? params.ease(p) : p;
      const colorProp = params.colorProp || 'stroke';
      const color = lerpColor(params.from ?? COL_BRIGHT, params.to, eased);
      els.forEach(el => {
        el.style.opacity = params.opacityFrom != null
          ? params.opacityFrom + (params.opacityTo - params.opacityFrom) * eased
          : 1;
        el.style[colorProp] = color;
      });
    }
  };

  // Plain opacity fade for elements whose normal CSS already has the colour.
  const fadeIn = {
    reset(els){ els.forEach(el => { el.style.opacity = 0; }); },
    apply(els, p, params){
      const eased = params.ease ? params.ease(p) : p;
      const from = params.opacityFrom ?? 0;
      const to = params.opacityTo ?? 1;
      els.forEach(el => { el.style.opacity = from + (to - from) * eased; });
    }
  };

  // Reveals grouped FOV sectors in order while rotating the ring into place.
  // Each target is an array, allowing a band segment and its tick to appear
  // together as one editable sequence beat.
  const sectorSweepIn = {
    reset(groups, params){
      groups.flat().forEach(el => { el.style.opacity = 0; });
      const angle = params.fromAngle ?? 0;
      params.ring.style.transform = `rotate(${angle}deg)`;
      params.onUpdate?.(angle);
    },
    apply(groups, p, params){
      const eased = params.ease ? params.ease(p) : p;
      const visibleCount = Math.ceil(groups.length * p);
      groups.forEach((group, i) => {
        group.forEach(el => { el.style.opacity = i < visibleCount ? 1 : 0; });
      });

      const from = params.fromAngle ?? 0;
      const to = params.toAngle ?? 0;
      const angle = from + (to - from) * eased;
      params.ring.style.transform = `rotate(${angle}deg)`;
      params.onUpdate?.(angle);
    }
  };

  // General-purpose rotation effects retained as additional options for
  // sequence experiments.
  const rotateIn = {
    reset(els, params){ els.forEach(el => { el.style.transform = `rotate(${params.from}deg)`; }); },
    apply(els, p, params){
      const eased = params.ease ? params.ease(p) : p;
      const angle = params.from + (params.to - params.from) * eased;
      els.forEach(el => { el.style.transform = `rotate(${angle}deg)`; });
      params.onUpdate?.(angle);
    }
  };

  const rotateAround = {
    reset(els, params){ els.forEach(el => { el.style.transform = `rotate(${params.from ?? 0}deg)`; }); },
    apply(els, p, params){
      const eased = params.ease ? params.ease(p) : p;
      const angle = (params.from ?? 0) + params.direction * params.degrees * eased;
      els.forEach(el => { el.style.transform = `rotate(${angle}deg)`; });
      params.onUpdate?.(angle);
    }
  };

  // ==========================================================
  // Sequence definition - complete startup
  // ==========================================================
  //
  // This is the experiment board for every visible startup element. Change
  // durations, `start` relationships, effects, and effect parameters here.
  // Array order only needs to respect dependencies: a referenced step must be
  // listed before the step that refers to it.

  const T_CASCADE = 500;
  const FOV_START_ANGLE = 60;

  const startupSteps = [
    // ----- zoom ring structure -----
    {
      id: 'pointer', effect: flashIn, duration: T_CASCADE, start: 1000,
      targets: () => [pointerBoxEl, pointerTriEl],
      params: { from: COL_BRIGHT, to: COL_NORMAL, colorProp: 'background' }
    },
    {
      id: 'minors', effect: flashIn, duration: T_CASCADE, start: { after: 'pointer', at: 1.25 },
      targets: () => minorTicks.map(t => t.el),
      params: { from: COL_BRIGHT, to: COL_DIM }
    },
    {
      id: 'majors', effect: flashIn, duration: T_CASCADE, start: { after: 'pointer', at: 0.5 },
      targets: () => majorTickEls,
      params: { from: COL_BRIGHT, to: COL_MID }
    },
    {
      id: 'ring', effect: flashIn, duration: T_CASCADE, start: { after: 'minors', at: 0.25 },
      targets: () => [greebleTrackEl],
      params: { from: COL_BRIGHT, to: COL_DIM, opacityFrom: 0.25, opacityTo: 0.4 }
    },

    // ----- zoom ring numbers -----
    {
      id: 'zoomNumbers', effect: flashIn, duration: 500, start: { after: 'ring', at: 0.5 },
      targets: () => zoomLabels.map(({ el }) => el),
      params: { from: COL_BRIGHT, to: COL_MID, colorProp: 'fill' }
    },

    // ----- FOV ring -----
    {
      id: 'fovRing', effect: sectorSweepIn, duration: 800, start: { after: 'ring', at: 0.75 },
      targets: () => fovSegments.map((seg, i) => [seg.el, fovTicks[i].el]),
      params: {
        ring: fovRingEl,
        fromAngle: FOV_START_ANGLE,
        toAngle: 0,
        ease: easeOutCubic,
        onUpdate: positionFovLabels
      }
    },

    // ----- FOV ring numbers -----
    {
      id: 'fovNumbers', effect: flashIn, duration: 500, start: { after: 'fovRing', at: 0.65 },
      targets: () => fovLabels.map(({ el }) => el),
      params: { from: COL_BRIGHT, to: COL_GLASS, colorProp: 'fill' }
    },

    // ----- centre readout -----
    {
      id: 'eyebrow', effect: flashIn, duration: 400, start: { after: 'fovRing', at: 0.25 },
      targets: () => [eyebrowEl],
      params: { from: COL_BRIGHT, to: COL_MID, colorProp: 'color' }
    },
    {
      id: 'value', effect: flashIn, duration: 450, start: { after: 'eyebrow', at: 0.5 },
      targets: () => [valueEl],
      params: { from: COL_BRIGHT, to: COL_NORMAL, colorProp: 'color' }
    },
    {
      id: 'fovReadout', effect: flashIn, duration: 400, start: { after: 'value', at: 0.5 },
      targets: () => [fovBoxEl],
      params: { from: COL_BRIGHT, to: COL_GLASS, colorProp: 'color' }
    }
  ];

  resolveStarts(startupSteps);

  let sequenceActive = false;

  function resetDisplayState(){
    document.body.classList.add('startup-pending');
    rotation = 0;
    render();

    // Arc-based indicators are ordinary stroked circles until a dash pattern
    // is assigned, so explicitly collapse them before every sequence run.
    [greebleFillEl, deadZoneEl].forEach(el =>
      el.setAttribute('stroke-dasharray', `0 ${gCircumference}`));

    [valueEl, fovBoxEl, eyebrowEl, pointerBoxEl, pointerTriEl].forEach(el =>
      el.classList.remove('maxed'));
  }

  function finishStartupSequence(){
    document.body.classList.remove('startup-pending');

    // Remove temporary animation styles so normal CSS and max-zoom classes
    // regain control during interaction.
    [pointerBoxEl, pointerTriEl].forEach(el => {
      el.style.opacity = '';
      el.style.background = '';
    });
    majorTickEls.forEach(el => {
      el.style.opacity = '';
      el.style.stroke = '';
    });
    minorTicks.forEach(({ el }) => {
      el.style.opacity = '';
      el.style.stroke = '';
    });
    greebleTrackEl.style.opacity = '';
    greebleTrackEl.style.stroke = '';

    zoomLabels.forEach(({ el }) => {
      el.style.opacity = '';
      el.style.fill = '';
    });
    fovSegments.forEach(({ el }) => { el.style.opacity = ''; });
    fovTicks.forEach(({ el }) => { el.style.opacity = ''; });
    fovLabels.forEach(({ el }) => {
      el.style.opacity = '';
      el.style.fill = '';
    });

    [eyebrowEl, valueEl, fovBoxEl].forEach(el => {
      el.style.opacity = '';
      el.style.color = '';
    });

    fovRingEl.style.transform = '';
    positionFovLabels(0);
    sequenceActive = false;
    render();
  }

  function runStartupSequence(){
    if (sequenceActive) return;
    sequenceActive = true;

    resetDisplayState();
    runTimeline(startupSteps, finishStartupSequence);
  }

  replayBtn.addEventListener('click', runStartupSequence);"""

          pattern = re.compile(
              r"  function shuffled\(n\)\{.*?  replayBtn\.addEventListener\('click', runStartupSequence\);",
              re.S,
          )
          text, count = pattern.subn(new_sequence, text, count=1)
          if count != 1:
              raise SystemExit('Expected legacy startup sequence block was not found exactly once')

          path.write_text(text)
          PY

      - name: Commit patch and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/apply-full-sequence-config.yml
          git add zoomdial-2-0.html .github/workflows/apply-full-sequence-config.yml
          git commit -m "Make all startup elements sequence-configurable"
          git push
