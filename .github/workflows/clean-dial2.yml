name: Clean dial2 browser snapshot

on:
  push:
    paths:
      - tools/clean_dial2.py
      - .github/workflows/clean-dial2.yml

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean dial2 and update comments
        run: python tools/clean_dial2.py
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm tools/clean_dial2.py .github/workflows/clean-dial2.yml
          git add dial2.html
          git commit -m "Clean dial2 source and clarify sequence timing"
          git push
